<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f2f8;--text2:#8b93a8;--text3:#5a6278;--accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.12);--accent-glow:rgba(79,142,247,0.25);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);--amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--radius:12px;--radius-sm:8px;--radius-xs:6px}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
  .app{display:flex;min-height:100vh}

  .sidebar{width:230px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .3s ease;overflow-y:auto}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
  .logo-mark{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--accent-glow)}
  .logo-text{font-size:16px;font-weight:600;letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
  .sidebar-nav{padding:16px 12px;flex:1}
  .nav-label{font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;margin-top:16px}
  .nav-label:first-child{margin-top:0}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-xs);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{background:var(--bg3);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
  .nav-item .icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
  .nav-count{margin-left:auto;background:var(--bg4);color:var(--text3);font-size:10px;font-weight:600;font-family:'DM Mono',monospace;padding:1px 7px;border-radius:20px;flex-shrink:0}
  .nav-item.active .nav-count{background:var(--accent-dim);color:var(--accent)}
  .sidebar-bottom{padding:12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px}

  .main{flex:1;margin-left:230px;display:flex;flex-direction:column;min-height:100vh}
  .header{padding:20px 28px;border-bottom:1px solid var(--border);background:rgba(15,17,23,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .header-title{font-size:18px;font-weight:600;letter-spacing:-.3px;margin-right:8px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
  .hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px}
  .content{padding:24px 28px;flex:1}

  .search-wrap{position:relative;width:280px}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
  .search-input{width:100%;padding:9px 12px 9px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s}
  .search-input::placeholder{color:var(--text3)}
  .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

  .btn-primary{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 0 16px var(--accent-glow);white-space:nowrap}
  .btn-primary:hover{opacity:.9}.btn-primary:active{transform:scale(.98)}
  .btn-ghost{padding:8px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;justify-content:center}
  .btn-ghost:hover{background:var(--bg3);border-color:var(--border2);color:var(--text)}
  .btn-ghost.danger:hover{background:var(--red-dim);border-color:var(--red);color:var(--red)}
  .btn-icon{width:30px;height:30px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
  .btn-icon:hover{background:var(--bg4);color:var(--text)}.btn-icon.danger:hover{background:var(--red-dim);border-color:var(--red);color:var(--red)}

  /* ── Drive / Save bar ── */
  .save-bar{border-radius:var(--radius-sm);padding:13px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--border);background:var(--bg2)}
  .save-bar.drive-connected{border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.05)}
  .save-bar.drive-dirty{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.05)}
  .save-bar-info{flex:1;min-width:0}
  .save-bar-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
  .save-bar-sub{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .save-bar-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
  .save-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
  .dot-none{background:var(--text3)}
  .dot-ok{background:var(--green)}
  .dot-dirty{background:var(--amber);animation:pulse 1.5s infinite}
  .dot-busy{background:var(--accent);animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* Drive sign-in card */
  .drive-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:20px;text-align:center;display:none}
  .drive-card.show{display:block}
  .drive-card-icon{font-size:36px;margin-bottom:12px}
  .drive-card-title{font-size:15px;font-weight:600;margin-bottom:6px}
  .drive-card-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.6}
  .btn-google{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:box-shadow .15s}
  .btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .google-logo{width:18px;height:18px}

  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .2s}
  .stat-card:hover{border-color:var(--border2)}
  .stat-label{font-size:12px;color:var(--text3);font-weight:500;letter-spacing:.3px;margin-bottom:6px}
  .stat-value{font-size:26px;font-weight:600;letter-spacing:-.5px;font-family:'DM Mono',monospace}

  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .view-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
  .view-btn{padding:5px 12px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:6px;font-size:13px;transition:all .15s}
  .view-btn.active{background:var(--bg4);color:var(--text)}
  .results-info{font-size:13px;color:var(--text3)}

  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;position:relative;overflow:hidden;animation:fadeIn .25s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .login-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .card-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
  .card-meta{flex:1;min-width:0}
  .card-name{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
  .card-url{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .type-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:12px}
  .type-dot{width:5px;height:5px;border-radius:50%}
  .card-fields{display:flex;flex-direction:column;gap:7px}
  .card-field{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2)}
  .field-icon{color:var(--text3);font-size:12px;width:14px;text-align:center}
  .field-val{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .card-footer{display:flex;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .card-footer .btn-ghost{flex:1;padding:7px 0;font-size:12px}

  .list-view{display:flex;flex-direction:column;gap:6px}
  .list-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 16px;cursor:pointer;transition:border-color .15s,background .15s;animation:fadeIn .2s ease both}
  .list-item:hover{background:var(--bg3);border-color:var(--border2)}
  .list-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
  .list-name{font-size:13.5px;font-weight:500;min-width:140px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-url{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-user{font-size:12.5px;color:var(--text2);min-width:160px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}

  .empty-state{text-align:center;padding:64px 24px;grid-column:1/-1}
  .empty-icon{font-size:40px;margin-bottom:16px;opacity:.4}
  .empty-title{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px}
  .empty-sub{font-size:13px;color:var(--text3)}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);transform:scale(.96) translateY(8px);transition:transform .2s}
  .overlay.open .modal{transform:scale(1) translateY(0)}
  .modal-header{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .modal-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
  .modal-close{width:28px;height:28px;background:var(--bg4);border:none;border-radius:6px;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .modal-close:hover{background:var(--red-dim);color:var(--red)}
  .modal-body{padding:20px 22px}
  .modal-footer{padding:14px 22px 20px;display:flex;gap:10px}

  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.3px;margin-bottom:6px}
  .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s}
  .form-input::placeholder,.form-textarea::placeholder{color:var(--text3)}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .form-textarea{resize:vertical;min-height:72px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pw-field{position:relative}
  .pw-field .form-input{padding-right:40px;font-family:'DM Mono',monospace}
  .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px;transition:color .15s}
  .pw-toggle:hover{color:var(--text)}
  .btn-cancel{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s}
  .btn-cancel:hover{background:var(--bg4)}
  .btn-save{flex:2;padding:10px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:opacity .15s;box-shadow:0 0 16px var(--accent-glow)}
  .btn-save:hover{opacity:.9}

  .detail-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
  .detail-row:last-child{border-bottom:none}
  .detail-label{font-size:12px;color:var(--text3);font-weight:500;min-width:80px}
  .detail-val-wrap{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;min-width:0}
  .detail-val{font-size:13px;font-family:'DM Mono',monospace;word-break:break-all;text-align:right}
  .copy-btn{background:var(--bg4);border:none;border-radius:5px;color:var(--text3);padding:4px 8px;cursor:pointer;font-size:11px;transition:all .15s;flex-shrink:0;font-family:'DM Sans',sans-serif}
  .copy-btn:hover{background:var(--accent-dim);color:var(--accent)}
  .copy-btn.copied{background:var(--green-dim);color:var(--green)}

  .types-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .type-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm)}
  .type-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
  .type-row-name{flex:1;font-size:13.5px;font-weight:500}
  .type-row-cnt{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0}
  .type-row-builtin{font-size:10px;color:var(--text3);padding:2px 6px;background:var(--bg4);border-radius:4px;flex-shrink:0}
  .type-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 7px;border-radius:4px;transition:all .15s;flex-shrink:0}
  .type-del-btn:hover{background:var(--red-dim);color:var(--red)}
  .type-del-btn:disabled{opacity:.25;pointer-events:none}
  .color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
  .swatch:hover{transform:scale(1.15)}.swatch.selected{border-color:#fff}
  .info-box{background:var(--accent-dim);border:1px solid rgba(79,142,247,.25);border-radius:var(--radius-sm);padding:11px 14px;font-size:12.5px;color:var(--text2);line-height:1.6;margin-bottom:16px}
  .info-box b{color:var(--accent)}
  .section-sep{border:none;border-top:1px solid var(--border);margin:16px 0}

  /* Setup wizard */
  .setup-step{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
  .setup-step-num{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
  .setup-step-title{font-size:13.5px;font-weight:500;display:flex;align-items:center;margin-bottom:10px}
  .setup-step p{font-size:12.5px;color:var(--text3);line-height:1.7;margin-bottom:10px}
  .setup-step code{font-family:'DM Mono',monospace;font-size:12px;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--accent)}
  .setup-step a{color:var(--accent);text-decoration:none}
  .setup-step a:hover{text-decoration:underline}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;color:var(--text);z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;max-width:340px;line-height:1.5}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-color:var(--green);color:var(--green)}
  .toast.error{border-color:var(--red);color:var(--red)}
  .toast.warn{border-color:var(--amber);color:var(--amber)}

  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
    .sidebar-backdrop.open{display:block}.main{margin-left:0}.hamburger{display:flex}.search-wrap{width:200px}
  }
  @media(max-width:640px){
    .header{padding:14px 16px}.header-title{font-size:15px}.content{padding:16px}
    .stats-row{grid-template-columns:1fr 1fr}.cards-grid{grid-template-columns:1fr}
    .search-wrap{width:100%;flex:1}.header-right{width:100%}.form-row{grid-template-columns:1fr}
    .list-url,.list-user{display:none}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🔐</div>
        <div><div class="logo-text">Login Vault</div><div class="logo-sub">Credential Manager</div></div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-bottom">
      <button class="btn-ghost" onclick="openSettings()" style="width:100%">⚙ Manage Types</button>
      <button class="btn-ghost" onclick="exportCSV()" style="width:100%">↓ Export CSV</button>
    </div>
  </aside>
  <div class="sidebar-backdrop" id="backdrop" onclick="closeSidebar()"></div>

  <div class="main">
    <header class="header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="header-title" id="headerTitle">All Logins</div>
      <div class="header-right">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchBox" placeholder="Search logins…" oninput="render()">
        </div>
        <button class="btn-primary" onclick="openAdd()"><span style="font-size:16px;line-height:1">+</span> Add Login</button>
      </div>
    </header>

    <main class="content">

      <!-- Save / Drive bar -->
      <div class="save-bar" id="saveBar">
        <div class="save-dot dot-none" id="saveDot"></div>
        <div class="save-bar-info">
          <div class="save-bar-title" id="saveTitle">Storage</div>
          <div class="save-bar-sub" id="saveSub">Choose where to save your vault</div>
        </div>
        <div class="save-bar-actions" id="saveActions"></div>
      </div>

      <div class="stats-row" id="statsRow"></div>
      <div class="toolbar">
        <div class="results-info" id="resultsInfo"></div>
        <div class="view-toggle">
          <button class="view-btn active" id="vbGrid" onclick="setView('grid')">⊞ Grid</button>
          <button class="view-btn" id="vbList" onclick="setView('list')">☰ List</button>
        </div>
      </div>

const LS_KEY='vaultData_v3';
function lsSave(){ try{ localStorage.setItem(LS_KEY, JSON.stringify({types,logins,nextId,driveFileId})); }catch{} }
function lsLoad(){
  try{
    const d=JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if(d&&Array.isArray(d.logins)){ applyPayload(d); driveFileId=d.driveFileId||null; return true; }

  return false;
}

function applyPayload(d){
  types  = Array.isArray(d.types)&&d.types.length ? d.types : JSON.parse(JSON.stringify(DEFAULT_TYPES));
  logins = Array.isArray(d.logins) ? d.logins : [];
  nextId = d.nextId || (logins.length ? Math.max(...logins.map(l=>l.id))+1 : 1);
}
function buildPayload(){ return {types,logins,nextId}; }

function loadGoogleScripts(){

    const done=()=>{ if(++loaded===2) resolve(); };
    const s1=document.createElement('script'); s1.src='https://apis.google.com/js/api.js'; s1.onload=()=>{ gapi.load('client',async()=>{ await gapi.client.init({apiKey:GAPI_CONFIG.API_KEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']}); gapiReady=true; done(); }); }; document.head.appendChild(s1);

  });
}

async function driveSignIn(){
  if(!DRIVE_ENABLED){ toast('Add your Google API credentials in the GAPI_CONFIG section of the HTML first.','error',5000); return; }
  if(!gapiReady||!gisReady){ setDriveStatus('busy','Loading Google APIs…',''); await loadGoogleScripts(); }
  setDriveStatus('busy','Signing in…','');
  try{
    await new Promise((resolve,reject)=>{
      tokenClient.callback=(resp)=>{ if(resp.error) reject(resp); else resolve(resp); };
      tokenClient.requestAccessToken({prompt: driveSignedIn?'':'consent'});
    });
    driveSignedIn=true;
    toast('Signed in to Google!','success');
    await driveSync();
  } catch(e){
    setDriveStatus('none','Sign in failed','Try again');

}

function driveSignOut(){
  const token=gapi.client.getToken();
  if(token) google.accounts.oauth2.revoke(token.access_token,()=>{});

  driveSignedIn=false; driveFileId=null;

  updateSaveBar();
  toast('Signed out from Google Drive.');
}

/* Find or create the vault JSON file in Drive */
async function getOrCreateDriveFile(){
  if(driveFileId){
    // Verify it still exists
    try{ await gapi.client.drive.files.get({fileId:driveFileId,fields:'id,name'}); return driveFileId; }
    catch{ driveFileId=null; }
  }
  // Search for existing file
  const res=await gapi.client.drive.files.list({q:`name='${GAPI_CONFIG.DRIVE_FILE_NAME}' and trashed=false`,fields:'files(id,name)',spaces:'drive'});
  if(res.result.files&&res.result.files.length>0){
    driveFileId=res.result.files[0].id;
    return driveFileId;
  }
  // Create new file
  const meta={name:GAPI_CONFIG.DRIVE_FILE_NAME,mimeType:'application/json'};
  const created=await gapi.client.drive.files.create({resource:meta,fields:'id'});
  driveFileId=created.result.id;
  return driveFileId;
}

/* Download vault data from Drive */
async function driveLoad(){
  const fid=await getOrCreateDriveFile();
  try{
    const res=await gapi.client.drive.files.get({fileId:fid,alt:'media'});
    const data=typeof res.result==='string'?JSON.parse(res.result):res.result;
    if(data&&Array.isArray(data.logins)){
      applyPayload(data);
      isDirty=false;
      lsSave();
      return true;
    }
  } catch(e){
    // File might be empty / new
    if(e.status!==404) console.warn('Drive load:',e);
  }
  return false;
}

/* Upload vault data to Drive */
async function driveSave(){
  if(!driveSignedIn){ toast('Sign in to Google Drive first.','warn'); return; }
  setDriveStatus('busy','Saving to Drive…','');
  try{
    const fid=await getOrCreateDriveFile();
    const body=JSON.stringify(buildPayload(),null,2);
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+gapi.client.getToken().access_token},
      body
    });
    isDirty=false; lsSave();
    setDriveStatus('ok','Saved to Google Drive',GAPI_CONFIG.DRIVE_FILE_NAME);
    toast('Saved to Google Drive ✓','success');
  } catch(e){
    setDriveStatus('dirty','Save failed — click to retry',GAPI_CONFIG.DRIVE_FILE_NAME);
    toast('Drive save failed: '+(e.message||e),'error');
  }
}

/* Full sync: load from Drive, merge with local if newer */
async function driveSync(){
  setDriveStatus('busy','Syncing with Drive…','');
  try{
    const loaded=await driveLoad();
    if(loaded){
      rebuildAll();
      setDriveStatus('ok','Synced with Google Drive',GAPI_CONFIG.DRIVE_FILE_NAME);
      toast('Vault loaded from Google Drive — '+logins.length+' logins.','success');
    } else {
      // New Drive file — push local data up
      await driveSave();
    }
  } catch(e){
    setDriveStatus('none','Sync failed','');
    toast('Drive sync error: '+(e.message||e),'error');
  }
}

      <div class="form-group"><label class="form-label">Site Name *</label><input class="form-input" id="f_name" value="${esc(l.name)}" placeholder="My Client Store"></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="f_type">${types.map(t=>`<option value="${esc(t.id)}"${l.type===t.id?' selected':''}>${esc(t.label)}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Login URL *</label><input class="form-input" id="f_url" value="${esc(l.url)}" placeholder="store.myshopify.com/admin"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Username / Email *</label><input class="form-input" id="f_user" value="${esc(l.username)}" placeholder="admin@example.com"></div>
      <div class="form-group"><label class="form-label">Password</label>
        <div class="pw-field"><input class="form-input" id="f_pw" type="password" value="${esc(l.password)}" placeholder="••••••••"><button class="pw-toggle" type="button" onclick="togglePwField('f_pw',this)">👁</button></div></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f_notes" placeholder="Any extra details…">${esc(l.notes)}</textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    <button class="btn-save" onclick="submitLogin(${l.id},'${mode}')">${mode==='add'?'Save Login':'Update Login'}</button>
  </div>`;
}

function submitLogin(id,mode){
  const name=(document.getElementById('f_name').value||'').trim();
  const url=(document.getElementById('f_url').value||'').trim();
  const username=(document.getElementById('f_user').value||'').trim();
  if(!name||!url||!username){toast('Name, URL, and username are required.','error');return;}
  const obj={id:mode==='add'?nextId++:id,name,url,username,password:document.getElementById('f_pw').value,type:document.getElementById('f_type').value,notes:(document.getElementById('f_notes').value||'').trim()};
  if(mode==='add') logins.unshift(obj);
  else{const i=logins.findIndex(x=>x.id===id);if(i>=0)logins[i]=obj;}
  closeModal();markDirty();rebuildAll();
  toast(mode==='add'?'Login added!':'Login updated!','success');
}

function openView(id){
  const l=logins.find(x=>x.id===id);if(!l)return;
  const t=getType(l.type),dim=hexDim(t.color);
  openOverlay(`<div class="modal-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="card-avatar" style="background:${dim};color:${t.color};width:34px;height:34px;font-size:13px">${initials(l.name)}</div>
      <div><div class="modal-title">${esc(l.name)}</div>
        <span class="type-badge" style="background:${dim};color:${t.color};margin-bottom:0;font-size:11px"><span class="type-dot" style="background:${t.color}"></span>${esc(t.label)}</span></div>
    </div>
    <button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body">
    <div class="detail-row"><span class="detail-label">URL</span>
      <div class="detail-val-wrap"><span class="detail-val" style="font-size:12px">${esc(l.url)}</span><button class="copy-btn" onclick="copyVal(logins.find(x=>x.id==${id}).url,this)">Copy</button></div></div>
    <div class="detail-row"><span class="detail-label">Username</span>
      <div class="detail-val-wrap"><span class="detail-val">${esc(l.username)}</span><button class="copy-btn" onclick="copyVal(logins.find(x=>x.id==${id}).username,this)">Copy</button></div></div>
    <div class="detail-row"><span class="detail-label">Password</span>
      <div class="detail-val-wrap">
        <span class="detail-val" id="vpw_${id}">${'•'.repeat(Math.min((l.password||'').length,18))}</span>
        <button class="copy-btn" onclick="copyVal(logins.find(x=>x.id==${id}).password,this)">Copy</button>
        <button class="copy-btn" onclick="toggleViewPw(${id},this)">Show</button>
      </div></div>
    ${l.notes?`<div class="detail-row"><span class="detail-label">Notes</span><div class="detail-val-wrap"><span class="detail-val" style="font-family:'DM Sans',sans-serif;font-size:13px">${esc(l.notes)}</span></div></div>`:''}
  </div>
  <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Close</button><button class="btn-save" onclick="openEdit(${id})">Edit Login</button></div>`);
}

function toggleViewPw(id,btn){
  const l=logins.find(x=>x.id===id);if(!l)return;
  const el=document.getElementById('vpw_'+id);
  if(showPwIds[id]){el.textContent='•'.repeat(Math.min((l.password||'').length,18));btn.textContent='Show';showPwIds[id]=false;}
  else{el.textContent=l.password||'';btn.textContent='Hide';showPwIds[id]=true;}
}
function togglePwField(fid,btn){const f=document.getElementById(fid);f.type=f.type==='password'?'text':'password';btn.textContent=f.type==='password'?'👁':'🙈';}

function delLogin(id){
  if(!confirm('Delete this login?'))return;
  logins=logins.filter(x=>x.id!==id);
  markDirty();rebuildAll();toast('Login deleted.');
}
function copyVal(text,btn){
  const done=()=>{const o=btn.textContent;btn.textContent='✓ Copied';btn.classList.add('copied');setTimeout(()=>{btn.textContent=o;btn.classList.remove('copied');},1500);};
  navigator.clipboard?navigator.clipboard.writeText(text).then(done).catch(done):(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();})();
}

/* ═══════════════════════════════════════════════
   SETTINGS — Manage Types
═══════════════════════════════════════════════ */
function openSettings(){renderSettings();document.getElementById('overlay').classList.add('open');}
function renderSettings(){
  const cnt={};logins.forEach(l=>{cnt[l.type]=(cnt[l.type]||0)+1;});
  const rows=types.map(t=>{
    const c=cnt[t.id]||0,canDel=!t.builtin||c===0;
    return `<div class="type-row">
      <div class="type-color-dot" style="background:${t.color}"></div>
      <span class="type-row-name">${esc(t.label)}</span>
      ${t.builtin?'<span class="type-row-builtin">built-in</span>':''}
      <span class="type-row-cnt">${c} login${c!==1?'s':''}</span>
      <button class="type-del-btn" ${canDel?'':'disabled'} onclick="deleteType('${esc(t.id)}')"
        title="${canDel?'Remove':'Has logins'}">✕</button></div>`;
  }).join('');
  const swatches=PALETTE.map(c=>`<div class="swatch${c===settingColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  document.getElementById('modal').innerHTML=`
    <div class="modal-header"><div class="modal-title">⚙ Manage Types</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="info-box">Organise logins into types. Built-in types can be removed only when empty. Custom types always removable — their logins move to <b>Other</b>.</div>
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px">Current Types (${types.length})</div>
      <div class="types-list">${rows}</div>
      <hr class="section-sep">
      <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px">Add New Type</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Type Name *</label><input class="form-input" id="nt_name" placeholder="e.g. cPanel, AWS, FTP" maxlength="32"></div>
        <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="nt_icon" placeholder="🌐" maxlength="4"></div>
      </div>
      <div class="form-group"><label class="form-label">Colour</label>
        <div class="color-swatches">${swatches}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:26px;height:26px;border-radius:6px;background:${settingColor};border:1px solid var(--border2)" id="colorPreview"></div>
          <span style="font-size:12px;color:var(--text3)">Custom hex:</span>
          <input class="form-input" id="nt_hex" value="${settingColor}" placeholder="#4f8ef7" style="width:110px;font-family:'DM Mono',monospace;font-size:12px" oninput="hexChanged(this)">
        </div>
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center" onclick="addType()">+ Add Type</button>
    </div>
    <div class="modal-footer"><button class="btn-save" onclick="closeModal()" style="flex:1">Done</button></div>`;
}

function pickColor(c){settingColor=c;const h=document.getElementById('nt_hex');if(h)h.value=c;const p=document.getElementById('colorPreview');if(p)p.style.background=c;document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('selected',rgbHex(s.style.background)===c));}
function hexChanged(inp){const v=inp.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v)){settingColor=v;const p=document.getElementById('colorPreview');if(p)p.style.background=v;document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));}}
function rgbHex(rgb){const m=rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);return m?'#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join(''):rgb;}

function addType(){
  const name=(document.getElementById('nt_name').value||'').trim();
  const icon=(document.getElementById('nt_icon').value||'').trim()||'⬡';
  const hex=(document.getElementById('nt_hex').value||'').trim();
  const color=/^#[0-9a-fA-F]{6}$/.test(hex)?hex:settingColor;
  if(!name){toast('Enter a type name.','error');return;}
  const id=name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  if(types.find(t=>t.id===id)){toast('That type already exists.','error');return;}
  types.push({id,label:name,color,icon,builtin:false});
  markDirty();buildSidebar();render();renderSettings();
  toast(`Type "${name}" added!`,'success');
}
function deleteType(id){
  const t=types.find(x=>x.id===id);if(!t)return;
  const c=logins.filter(l=>l.type===id).length;
  if(!confirm(c>0?`"${t.label}" has ${c} login(s). Remove?\n\nThose logins move to "Other".`:`Remove type "${t.label}"?`))return;
  if(c>0)logins.forEach(l=>{if(l.type===id)l.type='other';});
  types=types.filter(x=>x.id!==id);
  if(currentFilter===id)setFilter('');
  markDirty();buildSidebar();render();renderSettings();
  toast(`Type "${t.label}" removed.`);
}

function exportCSV(){
  const rows=[['Name','URL','Username','Password','Type','Notes']];
  logins.forEach(l=>rows.push([l.name,l.url,l.username,l.password,l.type,l.notes||'']));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n')],{type:'text/csv'}));
  a.download='login-vault.csv';a.click();URL.revokeObjectURL(a.href);
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('backdrop').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
(function(){
  if(!lsLoad()){
    types=JSON.parse(JSON.stringify(DEFAULT_TYPES));
    logins=JSON.parse(JSON.stringify(SAMPLE));
    nextId=5;
  }
  buildSidebar();render();updateSaveBar();
})();
</script>
</body>
